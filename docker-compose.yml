version: '3.8'
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      - HOST=0.0.0.0
      - REACT_APP_USE_FAKE_LOGIN=ThisIsNotProduction
      - BACKEND_LOGIN_URL=http://localhost:6001/login
      - PUBLIC_URL=http://localhost:3000
    ports:
      - "3000:3000"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      - NODE_ENV=development
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=labtool
      - DB_PORT=5432
      - DB_HOST=db
      - TOKEN=dev
      - SECRET=dev
      - ADMIN_PW=dev
      - USE_FAKE_LOGIN=ThisIsNotProduction
      - KURKI_URL=http://kurki:3002
    ports:
      - "6001:3001"
    depends_on:
      db:
        condition: service_healthy

  kurki:
    build:
      context: ./Kurki_simulation
      dockerfile: Dockerfile
    expose:
      - "3002"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: labtool
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
